<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center text-primary mb-3" style="font-weight: 700;">Tap Mapper</h1>
      <div class="row justify-content-between">
        {% if messages %}
        <ul class="alert alert-danger" style="list-style: none; line-height: 2;">
          {% for message in messages %}
            {% if 'register' in message.tags or 'login' in message.tags %}
              <li >{{ message }}</li>
            {% endif %}
          {% endfor %}
        </ul>
        {% endif %}
        <div class="col-md-6 mb-5">
          <h3 class="mb-3">Register</h3>
          <form action="{% url 'auth' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group mb-3">
              <label for="first_name">First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ saved_data.first_name }}" />
            </div>
            <div class="form-group mb-3">
              <label for="last_name">Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ saved_data.last_name }}" />
            </div>
            <div class="form-group mb-3">
              <label for="email">Email</label>
              <input type="email" name="email" class="form-control" value="{{ saved_data.email }}" />
            </div>
            <div class="form-group mb-3">
              <label for="password">Password</label>
              <input type="password" name="password" class="form-control" />
            </div>
            <div class="form-group mb-3">
              <label for="confirm_password">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" />
            </div>
            <input type="hidden" name="type" value="register" />
            <button class="btn btn-primary px-4">Create account</button>
          </form>
        </div>
        <div class="col-md-6">
          <h3 class="mb-3">Login</h3>
          <form action="{% url 'auth' %}" method="post">
            {% csrf_token %}
            <div class="form-group mb-3">
              <label for="email">Email</label>
              <input type="email" name="email" class="form-control" value="{{ login_saved_data.email }}" />
            </div>
            <div class="form-group mb-3">
              <label for="password">Password</label>
              <input type="password" name="password" class="form-control" />
            </div>
            <input type="hidden" name="type" value="login" />
            <button class="btn btn-primary px-4">Sign in</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
