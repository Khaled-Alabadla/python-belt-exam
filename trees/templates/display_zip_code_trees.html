<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zip Code Trees</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
        <style>
     @media (max-width: 991px) {
      .header h3 {
        flex-direction: column;
        justify-content: flex-start;
      }
     }
     .container {
        padding: 0 20px
     }
    </style>

</head>
<body>
    <div class="container my-5">
     <div class="header d-flex row justify-content-between mb-3">
            <h2 class="col-md-4">Tree Mapper</h2>
            <h3 class="col-md-3 d-flex justify-content-end">Welcome {{user.first_name}}</h3>
        </div>
       <div class="d-flex justify-content-between">
        <p class="col-md-5">Find, share, and learn about real trees!</p>
       <div class="d-flex justify-content-end mb-3" style="gap: 10px">
         <a class="btn btn-primary" href="{% url "index" %}">Dashboard</a>
         <form class="" action="{% url "logout" %}" method="POST">
            {% csrf_token %}
            <button class="btn btn-danger px-3">Logout</button>
         </form>
       </div>
       </div>
      <div class="row">
        <div class="content">
            <h2 class="mb-3">Trees in zip code {{zip}}</h2>
           <div class="col-md-12">
            <table class="table table-striped table-bordered table-hovered">
                <thead>
                    <tr>
                        <th>Species</th>
                        <th>Date Seen</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody>
                    {% for tree in trees %}
                        <tr>
                            <td>{{tree.species}}</td>
                            <td>{{tree.date}}</td>
                            <td>{{tree.location}}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
           </div>
        </div>
    </div>
</body>
</html>
