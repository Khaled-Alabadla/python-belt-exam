<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Tree</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
     @media (max-width: 991px) {
      .header h3 {
        flex-direction: column;
        justify-content: flex-start;
      }
     }
    </style>
  </head>
  <body>
    <div class="container my-5">
        <div class="header d-flex row justify-content-between mb-3">
            <h2 class="col-md-4">Add a tree on the map</h2>
            <h3 class="col-md-3 d-flex justify-content-end">Welcome {{user.first_name}}</h3>
        </div>
       <div class="d-flex justify-content-end mb-3" style="gap: 10px">
        <a class="btn btn-primary" href="{% url "index" %}">Dashboard</a>
         <form class="" action="{% url "logout" %}" method="POST">
            {% csrf_token %}
            <button class="btn btn-danger px-3">Logout</button>
         </form>
       </div>
      <div class="row">
        {% if messages %}
        <ul class="alert alert-danger" style="list-style: none; line-height: 2;">
          {% for message in messages %}
              <li >{{ message }}</li>
          {% endfor %}
        </ul>
        {% endif %}
        <div class="col-md-12">
          <form action="{% url 'create_tree' %}" method="post" >
            {% csrf_token %}
            <div class="form-group mb-3">
              <label for="species">Species</label>
              <input type="text" name="species" class="form-control" value="{{ saved_data.species }}" />
            </div>
            <div class="form-group mb-3">
              <label for="location">Location</label>
              <input type="text" name="location" class="form-control" value="{{ saved_data.location }}" />
            </div>
            <div class="form-group mb-3">
              <label for="zip_code">Zip Code</label>
              <input type="text" name="zip_code" class="form-control" value="{{ saved_data.zip_code }}" />
            </div>
            <div class="form-group mb-3">
              <label for="email">Date Found</label>
              <input type="date" name="date" class="form-control" value="{{ saved_data.date }}" />
            </div>

            <div class="form-group mb-3">
              <label for="email">Notes</label>
              <textarea name="notes" id="notes" class="form-control">{{saved_data.notes}}</textarea>
            </div>
          
            <button class="btn btn-primary px-4">Submit</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
